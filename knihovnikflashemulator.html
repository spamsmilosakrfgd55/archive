<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Knihovník - Arcbin Archive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: #000;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container ruffle-player {
            aspect-ratio: 16 / 9;
            width: 100%;
            max-width: calc(100vh * (16 / 9));
            max-height: calc(100vw * (9 / 16));
        }

        #arcbin-branding {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 500;
            font-size: 0.85em;
            opacity: 0.7;
        }

        .github-link {
            color: #fff;
            text-decoration: none;
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<div id="arcbin-branding"></div>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
<script>
    window.RufflePlayer = window.RufflePlayer || {};
    window.RufflePlayer.config = {
        allowScriptAccess: true,
        networking: "all"
    };

    window.addEventListener("load", () => {
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();

        document.getElementById("game-container").appendChild(player);

        player.style.width = "100%";
        player.style.height = "100%";

        player.load("hm.swf");

        // hack na dictionary
        setInterval(() => {
            try {
                player.set_variable("com.geewa.knihovnik.Dictionary.prototype.VerifyWords", function(words) {
                    this.onVerifyWords(words.map(w => ({ val: w, exists: "1" })));
                });

                player.set_variable("com.geewa.knihovnik.Dictionary.prototype.onVerifyWords", function(words) {
                    for (var i in words) {
                        words[i].exists = "1";
                    }
                    this.broadcastMessage("onVerifyWords", words);
                });
            } catch (e) {}
        }, 100);
    });
</script>

</body>
</html>
