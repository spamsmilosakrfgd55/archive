<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruffle Fullscreen Flash Game</title>
    <style>
        /* Vynucení fullscreenu a odstranění okrajů */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Černé pozadí pod hrou */
        }
        
        #ruffle-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="ruffle-container"></div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("ruffle-container");
            
            container.appendChild(player);
            
            // Konfigurace: automatické spuštění a skrytí splash obrazovky Ruffle
            player.config = {
                "autoplay": "on",
                "splashScreen": false,
                "unmuteOverlay": "hidden",
                "scale": "showAll" // Hra se roztáhne, ale zachová poměr stran
            };
            
            // Načtení vaší hry
            player.load({ url: "hm.swf" }); // ZDE ZMĚŇTE NA JMÉNO VAŠEHO SOUBORU
        });
    </script>
</body>
</html>
